name: nitro_rush
description: "NitroRush: Traffic Escape - Arcade Endless Racing"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Game engine
  flame: ^1.18.0
  flame_audio: ^2.10.4

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Audio
  audioplayers: ^6.0.0

  # Animations
  rive: ^0.13.13
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # Utility
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0
  equatable: ^2.0.5
  encrypt: ^5.0.3
  crypto: ^3.0.3
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  sensors_plus: ^6.0.1
  vibration: ^2.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # NOTE: Supabase / Firebase / AdMob are wired via service interfaces in
  # lib/services. To enable them, uncomment the packages below and supply
  # credentials via lib/config/secrets.dart, then update the corresponding
  # service implementation in lib/services/.
  # supabase_flutter: ^2.5.1
  # firebase_core: ^3.1.0
  # firebase_analytics: ^11.0.1
  # firebase_crashlytics: ^4.0.1
  # firebase_messaging: ^15.0.1
  # google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/data/
